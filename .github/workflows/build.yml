name: Build and Push Docker Image

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at 00:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: "Bilidown version tag (e.g. v2.1.1). Leave empty to auto-detect latest."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bilidown

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout bilidown-docker
        uses: actions/checkout@v4

      - name: Get latest bilidown release
        id: release
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(gh api repos/iuroc/bilidown/releases/latest --jq '.tag_name')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building bilidown ${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout bilidown at release tag
        uses: actions/checkout@v4
        with:
          repository: iuroc/bilidown
          ref: ${{ steps.release.outputs.version }}
          path: bilidown-src

      - name: Copy Dockerfile into bilidown source
        run: cp docker/Dockerfile bilidown-src/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./bilidown-src
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
